name: Release On Version Tag

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Release Notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          tag="$GITHUB_REF_NAME"
          commit="$(git rev-list -n 1 "$tag")"
          tag_subject="$(git for-each-ref --format='%(subject)' "refs/tags/$tag")"
          tag_body="$(git for-each-ref --format='%(body)' "refs/tags/$tag")"
          previous_tag=""
          first_release="false"

          if git rev-parse "${commit}^" >/dev/null 2>&1; then
            previous_tag="$(git describe --tags --abbrev=0 "${commit}^" 2>/dev/null || true)"
          fi

          if [[ -n $previous_tag ]]; then
            commit_range="${previous_tag}..${commit}"
            range_label="${previous_tag} -> ${tag}"
            intro_line="Changes since ${previous_tag}"
          else
            commit_range="$commit"
            range_label="Project start -> ${tag}"
            intro_line="Changes included in the first tagged release"
            first_release="true"
          fi

          if [[ -n $tag_subject ]]; then
            release_title="$tag_subject"
          else
            release_title="$(git log -1 --format=%s "$commit")"
          fi

          if [[ -n $tag_body ]]; then
            release_intro="$tag_body"
          else
            release_intro="$(git log -1 --format=%B "$commit")"
          fi

          release_file="$(mktemp)"

          {
            printf '## 🚀 %s\n\n' "$release_title"
            printf '%s\n\n' "$release_intro"
            printf '### ✨ %s\n\n' "$intro_line"

            if [[ $first_release == "true" ]]; then
              changelog="$(git log --reverse --format='- %s (%h)' "$commit_range")"
            else
              changelog="$(git log --format='- %s (%h)' "$commit_range")"
            fi

            if [[ -n $changelog ]]; then
              printf '%s\n' "$changelog"
            else
              printf -- '- No commits found in this range.\n'
            fi

            printf '\n### 🧭 Range\n\n'
            printf -- '- `%s`\n' "$range_label"
            printf -- '- Tagged commit: `%s`\n' "$(git rev-parse --short "$commit")"
          } > "$release_file"

          {
            printf 'title<<EOF\n%s\nEOF\n' "$release_title"
            printf 'body_path<<EOF\n%s\nEOF\n' "$release_file"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.notes.outputs.title }}
          body_path: ${{ steps.notes.outputs.body_path }}
          tag_name: ${{ github.ref_name }}
