exec-once = uwsm-app -- hypridle
exec-once = uwsm-app -- mako
exec-once = ! leenium-toggle-enabled waybar-off && uwsm-app -- waybar
exec-once = uwsm-app -- fcitx5 --disable notificationitem
exec-once = uwsm-app -- swaybg -i ~/.config/leenium/current/background -m fill
exec-once = uwsm-app -- swayosd-server
exec-once = uwsm-app -- wl-clip-persist --clipboard regular
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = leenium-cmd-first-run
exec-once = leenium-powerprofiles-init

# Slow app launch fix -- set systemd vars
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all
